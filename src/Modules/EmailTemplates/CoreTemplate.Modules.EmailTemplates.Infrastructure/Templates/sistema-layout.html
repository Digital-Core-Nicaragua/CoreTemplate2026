<!-- Asunto: Layout base -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif; }
    .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background-color: #1a1a2e; padding: 24px 32px; text-align: center; }
    .header img { max-height: 48px; }
    .header h1 { color: #ffffff; font-size: 20px; margin: 8px 0 0; }
    .body { padding: 32px; color: #333333; font-size: 15px; line-height: 1.6; }
    .footer { background-color: #f4f4f4; padding: 16px 32px; text-align: center; font-size: 12px; color: #888888; }
    .btn { display: inline-block; padding: 12px 28px; background-color: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: bold; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{SistemaNombre}}</h1>
    </div>
    <div class="body">
      {{Contenido}}
    </div>
    <div class="footer">
      &copy; {{AnioActual}} {{SistemaNombre}}. Todos los derechos reservados.<br/>
      <a href="{{SistemaUrl}}">{{SistemaUrl}}</a>
    </div>
  </div>
</body>
</html>
